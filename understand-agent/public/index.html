<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Understand Agent</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #e8e4df;
      --muted: #8a8580;
      --accent: #d4a574;
      --accent-dim: #a67c52;
      --success: #6b9e78;
      --danger: #c96b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 400;
      font-size: 1.75rem;
      margin: 0 0 0.25rem;
      color: var(--accent);
    }
    .subtitle { color: var(--muted); margin: 0 0 1.25rem; font-size: 0.95rem; }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }
    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      padding: 0.45rem 0.9rem;
    }
    .tab-btn.active {
      color: var(--accent);
      border-color: var(--accent-dim);
      background: #1a1510;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      margin: 0 0 1rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }
    .active-project {
      border-color: var(--accent-dim);
      background: linear-gradient(135deg, #141414 0%, #1a1510 100%);
    }
    .active-project .path { font-family: ui-monospace, monospace; font-size: 0.85rem; word-break: break-all; }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: #1f2a1f;
      color: var(--success);
      border: 1px solid #2d4a2d;
      margin-left: 0.5rem;
    }
    .badge.missing { background: #2a1f1f; color: var(--danger); border-color: #4a2d2d; }
    .project-list { list-style: none; padding: 0; margin: 0; }
    .project-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
    }
    .project-item:last-child { border-bottom: none; }
    .project-item label { flex: 1; cursor: pointer; min-width: 0; }
    .project-item .name { font-weight: 500; }
    .project-item .path { font-size: 0.78rem; color: var(--muted); font-family: ui-monospace, monospace; word-break: break-all; }
    .row { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-top: 1rem; }
    button, .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: #1c1c1c;
      color: var(--text);
      padding: 0.55rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    button:hover:not(:disabled), .btn:hover { border-color: var(--accent-dim); background: #222; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary {
      background: linear-gradient(180deg, #3d2f22 0%, #2a2018 100%);
      border-color: var(--accent-dim);
      color: var(--accent);
      font-weight: 600;
    }
    button.primary:hover:not(:disabled) { border-color: var(--accent); }
    input[type="text"] {
      flex: 1;
      min-width: 200px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    input:focus { outline: none; border-color: var(--accent-dim); }
    .links a { color: var(--accent); text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .log {
      margin-top: 1rem;
      padding: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      max-height: 240px;
      overflow: auto;
      color: var(--muted);
    }
    .log.error { color: var(--danger); }
    .log.success { color: var(--success); }
    .logs-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      margin-right: 0.35rem;
    }
    .live-dot.on { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .agent-log-view {
      margin: 0;
      padding: 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: ui-monospace, monospace;
      font-size: 0.78rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 420px;
      max-height: calc(100vh - 220px);
      overflow: auto;
      color: #c8c4bf;
    }
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(640px, 100%);
      max-height: 80vh;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .modal-header h3 { margin: 0; font-size: 1rem; }
    .modal-path {
      padding: 0.5rem 1.25rem;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      word-break: break-all;
    }
    .modal-body { overflow: auto; flex: 1; padding: 0.5rem 0; }
    .folder-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      text-align: left;
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 0;
      background: transparent;
    }
    .folder-row:hover { background: #1c1c1c; }
    .modal-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .checkbox { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: var(--muted); }
    .spinner { display: inline-block; width: 1em; height: 1em; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 0.4rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Understand Agent</h1>
    <p class="subtitle">Select a project, browse for a new codebase folder, and run analysis.</p>

    <div class="tabs">
      <button type="button" class="tab-btn active" data-tab="projects">Projects</button>
      <button type="button" class="tab-btn" data-tab="logs">Logs</button>
    </div>

    <div class="tab-panel active" id="tab-projects">
    <div class="card active-project" id="active-card">
      <h2>Active project</h2>
      <div id="active-name">Loading…</div>
      <div class="path" id="active-path"></div>
      <div class="row links" id="active-links"></div>
    </div>

    <div class="card">
      <h2>Saved projects</h2>
      <ul class="project-list" id="project-list"></ul>
      <div class="row">
        <button type="button" id="btn-activate">Set active</button>
        <button type="button" id="btn-understand" class="primary">Run /understand</button>
        <label class="checkbox"><input type="checkbox" id="full-rebuild" /> Full rebuild</label>
      </div>
      <div class="log" id="status-log">Ready.</div>
    </div>

    <div class="card">
      <h2>Add project</h2>
      <div class="row">
        <input type="text" id="new-name" placeholder="Project name (optional)" />
      </div>
      <div class="row">
        <input type="text" id="new-path" placeholder="/path/to/project" />
        <button type="button" id="btn-browse">Browse folders…</button>
      </div>
      <div class="row">
        <button type="button" id="btn-save" class="primary">Save &amp; activate</button>
      </div>
    </div>
    </div>

    <div class="tab-panel" id="tab-logs">
      <div class="card">
        <h2>Agent logs</h2>
        <div class="logs-toolbar">
          <span><span class="live-dot" id="live-dot"></span><span id="live-label">Idle</span></span>
          <span id="log-size">0 B</span>
          <label class="checkbox"><input type="checkbox" id="log-autoscroll" checked /> Auto-scroll</label>
          <button type="button" id="btn-refresh-logs">Refresh</button>
        </div>
        <pre class="agent-log-view" id="agent-log-view">Loading logs…</pre>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="browse-modal" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="browse-title">
      <div class="modal-header">
        <h3 id="browse-title">Choose project folder</h3>
        <button type="button" id="btn-close-browse">Close</button>
      </div>
      <div class="modal-path" id="browse-current-path"></div>
      <div class="modal-body" id="browse-list"></div>
      <div class="modal-footer">
        <button type="button" id="btn-browse-up">Up</button>
        <button type="button" id="btn-browse-select" class="primary">Select this folder</button>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let state = { activeProjectId: null, projects: [], browsePath: null, selectedProjectId: null, busy: false };
    let logStream = null;
    let logLines = [];

    function formatBytes(n) {
      if (n < 1024) return n + " B";
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
      return (n / (1024 * 1024)).toFixed(2) + " MB";
    }

    function setActiveTab(name) {
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.tab === name);
      });
      document.querySelectorAll(".tab-panel").forEach((panel) => {
        panel.classList.toggle("active", panel.id === "tab-" + name);
      });
      if (name === "logs") {
        loadLogs().catch((e) => appendLogLine("[error] " + e.message));
        connectLogStream();
      }
    }

    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => setActiveTab(btn.dataset.tab));
    });

    function appendLogLine(line) {
      logLines.push(line);
      const view = $("agent-log-view");
      view.textContent = logLines.join("\n");
      if ($("log-autoscroll").checked) {
        view.scrollTop = view.scrollHeight;
      }
    }

    function renderLogStats(stats) {
      $("log-size").textContent = formatBytes(stats.size || 0) + " / 30 MB max";
      const live = stats.running;
      $("live-dot").classList.toggle("on", live);
      $("live-label").textContent = live ? "Agent running" : "Idle";
    }

    async function loadLogs() {
      const data = await api("/logs?limit=5000");
      logLines = data.text ? data.text.split("\n").filter(Boolean) : [];
      $("agent-log-view").textContent = logLines.length ? logLines.join("\n") : "No logs yet.";
      renderLogStats(data);
      if ($("log-autoscroll").checked) {
        $("agent-log-view").scrollTop = $("agent-log-view").scrollHeight;
      }
    }

    function connectLogStream() {
      if (logStream) return;
      logStream = new EventSource("/logs/stream");
      logStream.onmessage = (event) => {
        try {
          const payload = JSON.parse(event.data);
          if (payload.type === "connected") {
            renderLogStats(payload);
            return;
          }
          if (payload.type === "entry" && payload.line) {
            appendLogLine(payload.line);
            if (payload.entry?.kind === "session.start" || payload.entry?.kind === "session.end" || payload.entry?.kind === "error") {
              api("/logs?limit=1").then((d) => renderLogStats(d)).catch(() => {});
            }
          }
        } catch {
          // ignore malformed SSE payloads
        }
      };
      logStream.onerror = () => {
        logStream.close();
        logStream = null;
        setTimeout(() => {
          if (document.getElementById("tab-logs").classList.contains("active")) connectLogStream();
        }, 2000);
      };
    }

    $("btn-refresh-logs").addEventListener("click", () => {
      loadLogs().catch((e) => appendLogLine("[error] " + e.message));
    });

    function log(msg, kind) {
      const el = $("status-log");
      el.textContent = msg;
      el.className = "log" + (kind ? " " + kind : "");
    }

    async function api(path, options) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json", ...(options && options.headers) },
        ...options,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || res.statusText || "Request failed");
      return data;
    }

    function graphBadge(hasGraph) {
      return hasGraph
        ? '<span class="badge">Graph ready</span>'
        : '<span class="badge missing">No graph</span>';
    }

    function renderActive(project, dashboardUrl) {
      $("active-name").innerHTML = project.name + graphBadge(project.status?.hasKnowledgeGraph);
      $("active-path").textContent = project.path;
      $("active-links").innerHTML = dashboardUrl
        ? `<a href="${dashboardUrl}" target="_blank" rel="noopener">Open dashboard ↗</a>`
        : `<span style="color:var(--muted)">Dashboard not running</span>`;
    }

    function renderProjects() {
      const list = $("project-list");
      if (!state.projects.length) {
        list.innerHTML = "<li style='color:var(--muted)'>No projects saved yet.</li>";
        return;
      }
      list.innerHTML = state.projects.map((p) => `
        <li class="project-item">
          <input type="radio" name="project" id="proj-${p.id}" value="${p.id}"
            ${p.id === (state.selectedProjectId || state.activeProjectId) ? "checked" : ""} />
          <label for="proj-${p.id}">
            <div class="name">${escapeHtml(p.name)} ${p.id === state.activeProjectId ? "· active" : ""}</div>
            <div class="path">${escapeHtml(p.path)}</div>
          </label>
          ${graphBadge(p.status?.hasKnowledgeGraph)}
        </li>
      `).join("");

      list.querySelectorAll('input[name="project"]').forEach((input) => {
        input.addEventListener("change", () => { state.selectedProjectId = input.value; });
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
    }

    async function refresh() {
      const [projectsRes, healthRes] = await Promise.all([
        api("/projects"),
        api("/health"),
      ]);
      state.activeProjectId = projectsRes.activeProjectId;
      state.projects = projectsRes.projects;
      if (!state.selectedProjectId) state.selectedProjectId = state.activeProjectId;
      const active = state.projects.find((p) => p.id === state.activeProjectId) || healthRes.activeProject;
      renderActive(active, healthRes.dashboardUrl);
      renderProjects();
    }

    function selectedId() {
      const checked = document.querySelector('input[name="project"]:checked');
      return checked ? checked.value : state.activeProjectId;
    }

    function setBusy(busy) {
      state.busy = busy;
      $("btn-activate").disabled = busy;
      $("btn-understand").disabled = busy;
      $("btn-save").disabled = busy;
      $("btn-browse").disabled = busy;
    }

    async function loadBrowse(path) {
      const q = path ? "?path=" + encodeURIComponent(path) : "";
      const data = await api("/browse" + q);
      state.browsePath = data.path;
      $("browse-current-path").textContent = data.path;
      const list = $("browse-list");
      list.innerHTML = "";
      if (data.parent) {
        const up = document.createElement("button");
        up.type = "button";
        up.className = "folder-row";
        up.textContent = "⬆ Parent folder";
        up.addEventListener("click", () => loadBrowse(data.parent));
        list.appendChild(up);
      }
      for (const entry of data.entries) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "folder-row";
        btn.textContent = "📁 " + entry.name;
        btn.addEventListener("click", () => loadBrowse(entry.path));
        list.appendChild(btn);
      }
      if (!data.entries.length && !data.parent) {
        list.innerHTML = "<p style='padding:1rem;color:var(--muted)'>No subfolders.</p>";
      }
    }

    function openBrowse() {
      $("browse-modal").classList.add("open");
      $("browse-modal").setAttribute("aria-hidden", "false");
      loadBrowse($("new-path").value.trim() || undefined).catch((e) => log(e.message, "error"));
    }

    function closeBrowse() {
      $("browse-modal").classList.remove("open");
      $("browse-modal").setAttribute("aria-hidden", "true");
    }

    $("btn-browse").addEventListener("click", openBrowse);
    $("btn-close-browse").addEventListener("click", closeBrowse);
    $("btn-browse-up").addEventListener("click", () => {
      if (state.browsePath) {
        const parts = state.browsePath.split("/").filter(Boolean);
        if (parts.length > 1) {
          parts.pop();
          loadBrowse("/" + parts.join("/")).catch((e) => log(e.message, "error"));
        }
      }
    });
    $("btn-browse-select").addEventListener("click", () => {
      if (state.browsePath) {
        $("new-path").value = state.browsePath;
        if (!$("new-name").value.trim()) {
          $("new-name").value = state.browsePath.split("/").filter(Boolean).pop() || "";
        }
        closeBrowse();
      }
    });
    $("browse-modal").addEventListener("click", (e) => {
      if (e.target === $("browse-modal")) closeBrowse();
    });

    $("btn-activate").addEventListener("click", async () => {
      const id = selectedId();
      if (!id) return;
      setBusy(true);
      log("Activating project…");
      try {
        const res = await api("/projects/" + encodeURIComponent(id) + "/activate", { method: "POST" });
        log(res.message || "Project activated.", "success");
        await refresh();
      } catch (e) {
        log(e.message, "error");
      } finally {
        setBusy(false);
      }
    });

    $("btn-save").addEventListener("click", async () => {
      const pathVal = $("new-path").value.trim();
      if (!pathVal) {
        log("Enter or browse to a project folder path.", "error");
        return;
      }
      setBusy(true);
      log("Saving project…");
      try {
        const res = await api("/projects", {
          method: "POST",
          body: JSON.stringify({
            name: $("new-name").value.trim() || undefined,
            path: pathVal,
            activate: true,
          }),
        });
        log(res.message || "Project saved.", "success");
        $("new-path").value = "";
        $("new-name").value = "";
        await refresh();
      } catch (e) {
        log(e.message, "error");
      } finally {
        setBusy(false);
      }
    });

    $("btn-understand").addEventListener("click", async () => {
      const id = selectedId();
      if (!id) return;
      setBusy(true);
      log("Running /understand… Switch to the Logs tab to watch progress.");
      setActiveTab("logs");
      try {
        const res = await api("/understand", {
          method: "POST",
          body: JSON.stringify({
            projectId: id,
            full: $("full-rebuild").checked,
          }),
        });
        const summary = res.text ? res.text.slice(0, 1200) : "Analysis finished.";
        log((res.ok ? "Done.\n\n" : "Failed.\n\n") + summary, res.ok ? "success" : "error");
        await refresh();
        if (res.dashboardUrl) {
          renderActive(
            state.projects.find((p) => p.id === id) || { name: id, path: "", status: {} },
            res.dashboardUrl
          );
        }
      } catch (e) {
        log(e.message, "error");
      } finally {
        setBusy(false);
      }
    });

    refresh().catch((e) => log(e.message, "error"));
    connectLogStream();
  </script>
</body>
</html>
